{% extends 'base.html' %}
{% block title %}Nouveau sondage - SondagePro{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="card shadow fade-in-up">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <h2 class="fw-bold mb-1"><i class="bi bi-plus-circle-dotted"></i> Créer un nouveau sondage</h2>
          <p class="text-muted">Commencez par définir les informations de base</p>
        </div>
        <form method="post" novalidate>
          {% csrf_token %}
          <div class="mb-4">
            <label for="id_title" class="form-label">Titre du sondage</label>
            <input type="text" name="title" class="form-control" id="id_title" placeholder="Ex: Sondage de satisfaction client" required autofocus>
          </div>
          <div class="mb-4">
            <label for="id_description" class="form-label">Description</label>
            <textarea name="description" class="form-control" id="id_description" rows="3" placeholder="Décrivez l'objectif de votre sondage..."></textarea>
          </div>
          <div class="row mb-4">
            <div class="col-md-6">
              <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" name="allow_anonymous" id="id_allow_anonymous" checked>
                <label class="form-check-label" for="id_allow_anonymous">Autoriser les réponses anonymes</label>
              </div>
            </div>
            <div class="col-md-6">
              <label for="id_expires_at" class="form-label">Date d'expiration (optionnel)</label>
              <input type="datetime-local" name="expires_at" class="form-control" id="id_expires_at">
            </div>
          </div>
          <div class="d-flex gap-3">
            <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Annuler</a>
            <button type="submit" class="btn btn-primary flex-grow-1"><i class="bi bi-arrow-right-circle-fill"></i> Créer et ajouter des questions</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
