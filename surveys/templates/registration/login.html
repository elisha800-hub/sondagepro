{% extends 'base.html' %}
{% block title %}Connexion - SondagePro{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5 col-lg-4">
    <div class="card shadow fade-in-up">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <div class="mb-3">
            <i class="bi bi-person-circle" style="font-size: 4rem; background: var(--bg-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;"></i>
          </div>
          <h2 class="fw-bold mb-1">Bienvenue</h2>
          <p class="text-muted">Connectez-vous à votre compte</p>
        </div>
        <form method="post" novalidate>
          {% csrf_token %}
          <div class="mb-3">
            <label for="id_username" class="form-label">Nom d'utilisateur</label>
            <div class="input-group">
              <span class="input-group-text bg-light"><i class="bi bi-person"></i></span>
              <input type="text" name="username" class="form-control" id="id_username" placeholder="Votre nom d'utilisateur" required autofocus>
            </div>
          </div>
          <div class="mb-4">
            <label for="id_password" class="form-label">Mot de passe</label>
            <div class="input-group">
              <span class="input-group-text bg-light"><i class="bi bi-lock"></i></span>
              <input type="password" name="password" class="form-control" id="id_password" placeholder="Votre mot de passe" required>
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100 btn-lg mb-3">
            <i class="bi bi-box-arrow-in-right"></i> Se connecter
          </button>
        </form>
        <div class="text-center">
          <p class="text-muted mb-2">Pas encore de compte ?</p>
          <a href="{% url 'register' %}" class="text-decoration-none fw-bold">
            <i class="bi bi-person-plus-fill"></i> Créer un compte gratuitement
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
